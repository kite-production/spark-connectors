# Spark Connector Spec — Voice Call
# Generated from OpenClaw extension: voice-call
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: voice-call
  name: "Voice Call"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: call
  iconColor: "#7bdc7b"
  description: >
    OpenClaw voice-call plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "WebRTC (pion/webrtc)"
    execution_mode: persistent
    # persistent = long-running container (monitors events)
    # on_demand  = container started per tool/action call, stopped after
    docker:
      image: ghcr.io/kite-production/connector-voice-call
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50136

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Voice Call"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: false
    supports_reactions: false
    supports_reply: true
    supports_edit: false
    supports_typing_indicator: false
    supports_groups: false
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "enabled"
      display: "enabled"
      type: boolean
      required: false
      description: "enabled"
      group: connection
    - name: "provider"
      display: "provider"
      type: text
      required: false
      description: "provider"
      group: connection
    - name: "telnyx"
      display: "telnyx"
      type: text
      required: false
      description: "telnyx"
      group: connection
    - name: "twilio"
      display: "twilio"
      type: text
      required: false
      description: "twilio"
      group: connection
    - name: "plivo"
      display: "plivo"
      type: text
      required: false
      description: "plivo"
      group: connection
    - name: "fromNumber"
      display: "fromNumber"
      type: text
      required: false
      description: "fromNumber"
      group: connection
    - name: "toNumber"
      display: "toNumber"
      type: text
      required: false
      description: "toNumber"
      group: connection
    - name: "inboundPolicy"
      display: "inboundPolicy"
      type: text
      required: false
      description: "inboundPolicy"
      group: connection
    - name: "allowFrom"
      display: "allowFrom"
      type: text
      required: false
      description: "allowFrom"
      group: connection
    - name: "inboundGreeting"
      display: "inboundGreeting"
      type: text
      required: false
      description: "inboundGreeting"
      group: connection
    - name: "outbound"
      display: "outbound"
      type: text
      required: false
      description: "outbound"
      group: connection
    - name: "maxDurationSeconds"
      display: "maxDurationSeconds"
      type: text
      required: false
      description: "maxDurationSeconds"
      group: advanced
    - name: "staleCallReaperSeconds"
      display: "staleCallReaperSeconds"
      type: text
      required: false
      description: "staleCallReaperSeconds"
      group: connection
    - name: "silenceTimeoutMs"
      display: "silenceTimeoutMs"
      type: text
      required: false
      description: "silenceTimeoutMs"
      group: advanced
    - name: "transcriptTimeoutMs"
      display: "transcriptTimeoutMs"
      type: text
      required: false
      description: "transcriptTimeoutMs"
      group: advanced
    - name: "ringTimeoutMs"
      display: "ringTimeoutMs"
      type: text
      required: false
      description: "ringTimeoutMs"
      group: advanced
    - name: "maxConcurrentCalls"
      display: "maxConcurrentCalls"
      type: text
      required: false
      description: "maxConcurrentCalls"
      group: advanced
    - name: "serve"
      display: "serve"
      type: text
      required: false
      description: "serve"
      group: connection
    - name: "tailscale"
      display: "tailscale"
      type: text
      required: false
      description: "tailscale"
      group: connection
    - name: "tunnel"
      display: "tunnel"
      type: text
      required: false
      description: "tunnel"
      group: connection
    - name: "webhookSecurity"
      display: "webhookSecurity"
      type: text
      required: false
      description: "webhookSecurity"
      group: connection
    - name: "streaming"
      display: "streaming"
      type: text
      required: false
      description: "streaming"
      group: advanced
    - name: "realtime"
      display: "realtime"
      type: text
      required: false
      description: "realtime"
      group: connection
    - name: "publicUrl"
      display: "publicUrl"
      type: text
      required: false
      description: "publicUrl"
      group: connection
    - name: "skipSignatureVerification"
      display: "skipSignatureVerification"
      type: boolean
      required: false
      description: "skipSignatureVerification"
      group: connection
    - name: "tts"
      display: "tts"
      type: text
      required: false
      description: "tts"
      group: connection
    - name: "store"
      display: "store"
      type: text
      required: false
      description: "store"
      group: connection
    - name: "responseModel"
      display: "responseModel"
      type: text
      required: false
      description: "responseModel"
      group: connection
    - name: "responseSystemPrompt"
      display: "responseSystemPrompt"
      type: text
      required: false
      description: "responseSystemPrompt"
      group: connection
    - name: "responseTimeoutMs"
      display: "responseTimeoutMs"
      type: text
      required: false
      description: "responseTimeoutMs"
      group: advanced

  tools:
    - name: "voice-call-send-message"
      method: POST
      description: "Send a message via Voice Call"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "voice-call-list-messages"
      method: GET
      description: "List recent messages from Voice Call"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Voice Call"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw voice-call extension"

  setup: |
    ## Voice Call Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/voice-call/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
