# Spark Connector Spec — IRC
# Generated from OpenClaw extension: irc
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: irc
  name: "IRC"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: terminal
  iconColor: "#8B8B8B"
  description: >
    OpenClaw IRC channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "thoj/go-ircevent"
    execution_mode: persistent
    # persistent = long-running container (monitors events)
    # on_demand  = container started per tool/action call, stopped after
    docker:
      image: ghcr.io/kite-production/connector-irc
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50162

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from IRC"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: false
    supports_reactions: false
    supports_reply: true
    supports_edit: false
    supports_typing_indicator: false
    supports_groups: false
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "irc_channels"
      display: "IRC_CHANNELS"
      type: text
      required: false
      description: "Environment variable: IRC_CHANNELS"
      group: advanced
    - name: "irc_host"
      display: "IRC_HOST"
      type: text
      required: false
      description: "Environment variable: IRC_HOST"
      group: connection
    - name: "irc_nick"
      display: "IRC_NICK"
      type: text
      required: false
      description: "Environment variable: IRC_NICK"
      group: advanced
    - name: "irc_nickserv_password"
      display: "IRC_NICKSERV_PASSWORD"
      type: secret
      required: true
      description: "Environment variable: IRC_NICKSERV_PASSWORD"
      group: advanced
    - name: "irc_nickserv_register_email"
      display: "IRC_NICKSERV_REGISTER_EMAIL"
      type: text
      required: false
      description: "Environment variable: IRC_NICKSERV_REGISTER_EMAIL"
      group: advanced
    - name: "irc_password"
      display: "IRC_PASSWORD"
      type: secret
      required: true
      description: "Environment variable: IRC_PASSWORD"
      group: advanced
    - name: "irc_port"
      display: "IRC_PORT"
      type: number
      required: false
      description: "Environment variable: IRC_PORT"
      group: connection
    - name: "irc_realname"
      display: "IRC_REALNAME"
      type: text
      required: false
      description: "Environment variable: IRC_REALNAME"
      group: advanced
    - name: "irc_tls"
      display: "IRC_TLS"
      type: text
      required: false
      description: "Environment variable: IRC_TLS"
      group: advanced
    - name: "irc_username"
      display: "IRC_USERNAME"
      type: text
      required: false
      description: "Environment variable: IRC_USERNAME"
      group: advanced

  tools:
    - name: "irc-send-message"
      method: POST
      description: "Send a message via IRC"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "irc-list-messages"
      method: GET
      description: "List recent messages from IRC"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to IRC"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw irc extension"

  setup: |
    ## IRC Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/irc/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
