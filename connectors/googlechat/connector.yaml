# Spark Connector Spec — Google Chat
# Generated from OpenClaw extension: googlechat
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: googlechat
  name: "Google Chat"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: question_answer
  iconColor: "#00AC47"
  description: >
    OpenClaw Google Chat channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "google.golang.org/api"
    execution_mode: persistent
    # persistent = long-running container (monitors events)
    # on_demand  = container started per tool/action call, stopped after
    docker:
      image: ghcr.io/kite-production/connector-googlechat
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50094

  auth:
    type: oauth2
    flow: interactive

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Google Chat"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: false
    supports_reactions: false
    supports_reply: true
    supports_edit: false
    supports_typing_indicator: false
    supports_groups: true
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    []

  tools:
    - name: "googlechat-send-message"
      method: POST
      description: "Send a message via Google Chat"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "googlechat-list-messages"
      method: GET
      description: "List recent messages from Google Chat"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Google Chat"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw googlechat extension"

  setup: |
    ## Google Chat Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/googlechat/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
