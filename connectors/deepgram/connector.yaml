apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: deepgram
  name: "Deepgram"
  type: service
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Services"
  tags: ["Service"]
  icon: mic
  iconColor: "#13EF93"
  description: >
    OpenClaw Deepgram media-understanding provider
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: typescript
    docker:
      image: spark/connector-deepgram
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50109

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Service connector — provides capabilities to agents"

  config:
    - name: "deepgram_api_key"
      display: "DEEPGRAM_API_KEY"
      type: secret
      required: true
      description: "Environment variable: DEEPGRAM_API_KEY"
      group: connection
    - name: "deepgram_base_url"
      display: "DEEPGRAM_BASE_URL"
      type: text
      required: false
      description: "Environment variable: DEEPGRAM_BASE_URL"
      group: connection
    - name: "deepgram_model"
      display: "DEEPGRAM_MODEL"
      type: text
      required: false
      description: "Environment variable: DEEPGRAM_MODEL"
      group: advanced
    - name: "deepgram_sample_url"
      display: "DEEPGRAM_SAMPLE_URL"
      type: text
      required: false
      description: "Environment variable: DEEPGRAM_SAMPLE_URL"
      group: connection

  tools:
    []

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Deepgram"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw deepgram extension"

  setup: |
    ## Deepgram Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

