# Spark Connector Spec — Image Generation
# Generated from OpenClaw extension: image-generation-core
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: image-generation-core
  name: "Image Generation"
  type: service
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Services"
  tags: ["Service"]
  icon: image
  iconColor: "#c084fc"
  description: >
    OpenClaw image generation runtime package
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "internal"
    docker:
      image: spark/connector-image-generation-core
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50154

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Service connector — provides capabilities to agents"

  config:
    - name: "gemini_api_key"
      display: "GEMINI_API_KEY"
      type: secret
      required: true
      description: "Environment variable: GEMINI_API_KEY"
      group: connection
    - name: "google_api_key"
      display: "GOOGLE_API_KEY"
      type: secret
      required: true
      description: "Environment variable: GOOGLE_API_KEY"
      group: connection
    - name: "openai_api_key"
      display: "OPENAI_API_KEY"
      type: secret
      required: true
      description: "Environment variable: OPENAI_API_KEY"
      group: connection

  tools:
    []

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Image Generation"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw image-generation-core extension"

  setup: |
    ## Image Generation Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/image-generation-core/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
