# Spark Connector Spec — Matrix
# Generated from OpenClaw extension: matrix
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: matrix
  name: "Matrix"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: grid_view
  iconColor: "#0DBD8B"
  description: >
    OpenClaw Matrix channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    docker:
      image: spark/connector-matrix
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50118

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Matrix"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: true
    supports_reactions: false
    supports_reply: true
    supports_edit: true
    supports_typing_indicator: true
    supports_groups: true
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "access_token"
      display: "ACCESS_TOKEN"
      type: secret
      required: true
      description: "Environment variable: ACCESS_TOKEN"
      group: connection
    - name: "device_id"
      display: "DEVICE_ID"
      type: text
      required: false
      description: "Environment variable: DEVICE_ID"
      group: advanced
    - name: "matrix_access_token"
      display: "MATRIX_ACCESS_TOKEN"
      type: secret
      required: true
      description: "Environment variable: MATRIX_ACCESS_TOKEN"
      group: connection
    - name: "matrix_default_access_token"
      display: "MATRIX_DEFAULT_ACCESS_TOKEN"
      type: secret
      required: true
      description: "Environment variable: MATRIX_DEFAULT_ACCESS_TOKEN"
      group: connection
    - name: "matrix_device_id"
      display: "MATRIX_DEVICE_ID"
      type: text
      required: false
      description: "Environment variable: MATRIX_DEVICE_ID"
      group: advanced
    - name: "matrix_homeserver"
      display: "MATRIX_HOMESERVER"
      type: text
      required: false
      description: "Environment variable: MATRIX_HOMESERVER"
      group: advanced
    - name: "matrix_ops_access_token"
      display: "MATRIX_OPS_ACCESS_TOKEN"
      type: secret
      required: true
      description: "Environment variable: MATRIX_OPS_ACCESS_TOKEN"
      group: connection
    - name: "matrix_ops_device_id"
      display: "MATRIX_OPS_DEVICE_ID"
      type: text
      required: false
      description: "Environment variable: MATRIX_OPS_DEVICE_ID"
      group: advanced
    - name: "matrix_ops_device_name"
      display: "MATRIX_OPS_DEVICE_NAME"
      type: text
      required: false
      description: "Environment variable: MATRIX_OPS_DEVICE_NAME"
      group: advanced
    - name: "matrix_ops_homeserver"
      display: "MATRIX_OPS_HOMESERVER"
      type: text
      required: false
      description: "Environment variable: MATRIX_OPS_HOMESERVER"
      group: advanced

  tools:
    - name: "matrix-send-message"
      method: POST
      description: "Send a message via Matrix"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "matrix-list-messages"
      method: GET
      description: "List recent messages from Matrix"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Matrix"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw matrix extension"

  setup: |
    ## Matrix Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/matrix/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
