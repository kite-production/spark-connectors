# Spark Connector Spec — Speech Core
# Generated from OpenClaw extension: speech-core
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: speech-core
  name: "Speech Core"
  type: service
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Services"
  tags: ["Service"]
  icon: graphic_eq
  iconColor: "#a7c8ff"
  description: >
    OpenClaw speech runtime package
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "internal"
    docker:
      image: ghcr.io/kite-production/connector-speech-core
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50076

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Service connector — provides capabilities to agents"

  config:
    - name: "openclaw_tts_prefs"
      display: "OPENCLAW_TTS_PREFS"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_TTS_PREFS"
      group: advanced

  tools:
    []

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Speech Core"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw speech-core extension"

  setup: |
    ## Speech Core Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/speech-core/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
