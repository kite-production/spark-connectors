# Spark Connector Spec — Slack
# Generated from OpenClaw extension: slack
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: slack
  name: "Slack"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: forum
  iconColor: "#4A154B"
  description: >
    OpenClaw Slack channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "slack-go/slack"
    execution_mode: persistent
    # persistent = long-running container (monitors events)
    # on_demand  = container started per tool/action call, stopped after
    docker:
      image: ghcr.io/kite-production/connector-slack
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50127

  auth:
    type: oauth2
    flow: interactive

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Slack"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: true
    supports_documents: true
    supports_threads: true
    supports_reactions: true
    supports_reply: true
    supports_edit: true
    supports_typing_indicator: true
    supports_groups: true
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "openclaw_slack_pairing_allowfrom_cache_ttl_ms"
      display: "OPENCLAW_SLACK_PAIRING_ALLOWFROM_CACHE_TTL_MS"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_SLACK_PAIRING_ALLOWFROM_CACHE_TTL_MS"
      group: advanced
    - name: "slack_app_token"
      display: "SLACK_APP_TOKEN"
      type: secret
      required: true
      description: "Environment variable: SLACK_APP_TOKEN"
      group: connection
    - name: "slack_bot_token"
      display: "SLACK_BOT_TOKEN"
      type: secret
      required: true
      description: "Environment variable: SLACK_BOT_TOKEN"
      group: connection
    - name: "slack_signing_secret"
      display: "SLACK_SIGNING_SECRET"
      type: secret
      required: true
      description: "Environment variable: SLACK_SIGNING_SECRET"
      group: advanced
    - name: "slack_user_token"
      display: "SLACK_USER_TOKEN"
      type: secret
      required: true
      description: "Environment variable: SLACK_USER_TOKEN"
      group: connection

  tools:
    - name: "slack-send-message"
      method: POST
      description: "Send a message via Slack"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "slack-list-messages"
      method: GET
      description: "List recent messages from Slack"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Slack"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw slack extension"

  setup: |
    ## Slack Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/slack/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
