# Spark Connector Spec — Magellan (Venus Bridge)
# Named after NASA's Venus-mapping spacecraft (1989-1994)
apiVersion: spark.dev/v1
kind: Connector
metadata:
  id: magellan
  name: "Venus (Magellan)"
  version: "1.0.0"
  publisher: "Spark Official"
  category: "Communication"
  tags: ["Testing", "Internal", "Development"]
  icon: science
  description: >
    Built-in test messaging service for smoke testing agent workflows
    without external dependencies. Uses the Venus in-memory messaging
    service with channel, thread, and webhook support.
  longDescription: >
    Venus is a lightweight, in-memory messaging service built for the
    Spark platform. The Magellan connector bridges Venus channels to
    Spark agents via NATS. Ideal for development, CI/CD smoke tests,
    and demo environments. Supports channels, threads, webhooks, and
    WebSocket streams. No external accounts or API keys from third
    parties required.
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

spec:
  # Docker image for the connector service
  docker:
    image: spark/connector-magellan
    tag: "1.0.0"
    ports:
      grpc: 50066
      webhook: 8091

  # Authentication method
  auth:
    type: api_key
    description: "Venus API key for authentication"

  # Capabilities this connector supports
  capabilities:
    supports_threads: true
    supports_reactions: false
    supports_edit: false
    supports_unsend: false
    supports_reply: true
    supports_attachments: false
    supports_images: false
    max_message_length: 10000

  # Configuration parameters required to create an instance
  config:
    - name: venus_url
      display: "Venus URL"
      type: text
      required: true
      default: "http://venus:8090"
      description: "Base URL of the Venus messaging service"

    - name: api_key
      display: "API Key"
      type: secret
      required: true
      default: "venus-test-key-2026"
      description: "Authentication key for Venus API access"

    - name: webhook_port
      display: "Webhook Port"
      type: text
      required: false
      default: "8091"
      description: "Port for receiving webhook callbacks from Venus"

  # Tools available when this connector is active
  tools:
    - name: venus-send-message
      method: POST
      description: "Send a message to a Venus channel"
      args:
        - name: channel_id
          type: string
          description: "Target channel ID (e.g. 'general')"
          required: true
        - name: text
          type: string
          description: "Message content (markdown supported)"
          required: true
        - name: thread_id
          type: string
          description: "Thread ID for threaded replies"
          required: false
        - name: reply_to_id
          type: string
          description: "Message ID being replied to"
          required: false

    - name: venus-list-messages
      method: GET
      description: "List messages in a Venus channel"
      args:
        - name: channel_id
          type: string
          description: "Channel ID to list messages from"
          required: true
        - name: since
          type: string
          description: "RFC3339 timestamp — only return messages after this time"
          required: false

    - name: venus-create-channel
      method: POST
      description: "Create a new Venus channel"
      args:
        - name: name
          type: string
          description: "Channel name (used as ID)"
          required: true
        - name: description
          type: string
          description: "Channel description"
          required: false

    - name: venus-list-channels
      method: GET
      description: "List all Venus channels"
      args: []

    - name: venus-register-webhook
      method: POST
      description: "Register a webhook URL for real-time message delivery"
      args:
        - name: url
          type: string
          description: "Webhook endpoint URL"
          required: true

    - name: venus-get-status
      method: GET
      description: "Get Venus service status and statistics"
      args: []

  # Version history
  versions:
    - version: "1.0.0"
      date: "2026-04-04"
      changes:
        - "Initial release"
        - "Channel and message management"
        - "Webhook delivery for connector integration"
        - "WebSocket real-time streams"
        - "API key authentication"
        - "In-memory storage (no database required)"

  # Setup instructions
  setup: |
    Venus is a built-in test service — no external accounts needed.

    1. Venus auto-starts with Docker Compose
    2. Default API key: venus-test-key-2026 (set VENUS_API_KEY to customize)
    3. Default channel: #general (auto-created on startup)
    4. Connector Magellan auto-registers with control-plane
    5. Test with: curl -H "Authorization: Bearer venus-test-key-2026" \
         http://venus:8090/api/channels/general/messages

    Environment Variables:
      VENUS_URL         - Venus service URL (default: http://venus:8090)
      VENUS_API_KEY     - Authentication key (default: venus-test-key-2026)
      VENUS_WEBHOOK_PORT - Webhook listener port (default: 8091)
