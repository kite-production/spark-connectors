# Spark Connector Spec — Synology Chat
# Generated from OpenClaw extension: synology-chat
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: synology-chat
  name: "Synology Chat"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: storage
  iconColor: "#B5B5B6"
  description: >
    Synology Chat channel plugin for OpenClaw
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    docker:
      image: spark/connector-synology-chat
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50119

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Synology Chat"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: false
    supports_reactions: false
    supports_reply: true
    supports_edit: false
    supports_typing_indicator: false
    supports_groups: false
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "openclaw_bot_name"
      display: "OPENCLAW_BOT_NAME"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_BOT_NAME"
      group: advanced
    - name: "synology_allowed_user_ids"
      display: "SYNOLOGY_ALLOWED_USER_IDS"
      type: text
      required: false
      description: "Environment variable: SYNOLOGY_ALLOWED_USER_IDS"
      group: advanced
    - name: "synology_chat_incoming_url"
      display: "SYNOLOGY_CHAT_INCOMING_URL"
      type: number
      required: false
      description: "Environment variable: SYNOLOGY_CHAT_INCOMING_URL"
      group: connection
    - name: "synology_chat_token"
      display: "SYNOLOGY_CHAT_TOKEN"
      type: secret
      required: true
      description: "Environment variable: SYNOLOGY_CHAT_TOKEN"
      group: connection
    - name: "synology_nas_host"
      display: "SYNOLOGY_NAS_HOST"
      type: text
      required: false
      description: "Environment variable: SYNOLOGY_NAS_HOST"
      group: connection
    - name: "synology_rate_limit"
      display: "SYNOLOGY_RATE_LIMIT"
      type: number
      required: false
      description: "Environment variable: SYNOLOGY_RATE_LIMIT"
      group: advanced

  tools:
    - name: "synology-chat-send-message"
      method: POST
      description: "Send a message via Synology Chat"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "synology-chat-list-messages"
      method: GET
      description: "List recent messages from Synology Chat"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Synology Chat"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw synology-chat extension"

  setup: |
    ## Synology Chat Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/synology-chat/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
