# Spark Connector Spec — Mattermost
# Generated from OpenClaw extension: mattermost
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: mattermost
  name: "Mattermost"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: forum
  iconColor: "#0058CC"
  description: >
    OpenClaw Mattermost channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: typescript
    framework: "typebox"
    docker:
      image: spark/connector-mattermost
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50137

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Mattermost"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: true
    supports_reactions: false
    supports_reply: true
    supports_edit: false
    supports_typing_indicator: false
    supports_groups: true
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "mattermost_bot_token"
      display: "MATTERMOST_BOT_TOKEN"
      type: secret
      required: true
      description: "Environment variable: MATTERMOST_BOT_TOKEN"
      group: connection
    - name: "mattermost_url"
      display: "MATTERMOST_URL"
      type: text
      required: false
      description: "Environment variable: MATTERMOST_URL"
      group: connection
    - name: "openclaw_gateway_port"
      display: "OPENCLAW_GATEWAY_PORT"
      type: number
      required: false
      description: "Environment variable: OPENCLAW_GATEWAY_PORT"
      group: connection
    - name: "openclaw_state_dir"
      display: "OPENCLAW_STATE_DIR"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_STATE_DIR"
      group: advanced

  tools:
    - name: "mattermost-send-message"
      method: POST
      description: "Send a message via Mattermost"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "mattermost-list-messages"
      method: GET
      description: "List recent messages from Mattermost"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Mattermost"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw mattermost extension"

  setup: |
    ## Mattermost Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  code:
    entrypoint: "api.ts"
    files:
      - path: "api.ts"
        language: typescript
        size: 232
      - path: "contract-api.ts"
        language: typescript
        size: 110
      - path: "contract-surfaces.ts"
        language: typescript
        size: 158
      - path: "index.ts"
        language: typescript
        size: 769
      - path: "openclaw.plugin.json"
        language: json
        size: 158
      - path: "runtime-api.ts"
        language: typescript
        size: 3378
      - path: "setup-entry.ts"
        language: typescript
        size: 178
