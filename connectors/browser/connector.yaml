# Spark Connector Spec — Browser
# Generated from OpenClaw extension: browser
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: browser
  name: "Browser"
  type: tool
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "DevTools"
  tags: ["Tool"]
  icon: language
  iconColor: "#4285F4"
  description: >
    OpenClaw browser tool plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: typescript
    docker:
      image: spark/connector-browser
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50076

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Action-only — invoked by agents on demand"

  config:
    - name: "all_proxy"
      display: "ALL_PROXY"
      type: text
      required: false
      description: "Environment variable: ALL_PROXY"
      group: advanced
    - name: "https_proxy"
      display: "HTTPS_PROXY"
      type: text
      required: false
      description: "Environment variable: HTTPS_PROXY"
      group: advanced
    - name: "http_proxy"
      display: "HTTP_PROXY"
      type: text
      required: false
      description: "Environment variable: HTTP_PROXY"
      group: advanced
    - name: "localappdata"
      display: "LOCALAPPDATA"
      type: text
      required: false
      description: "Environment variable: LOCALAPPDATA"
      group: advanced
    - name: "missing_gw_token"
      display: "MISSING_GW_TOKEN"
      type: secret
      required: true
      description: "Environment variable: MISSING_GW_TOKEN"
      group: connection
    - name: "no_proxy"
      display: "NO_PROXY"
      type: text
      required: false
      description: "Environment variable: NO_PROXY"
      group: advanced
    - name: "openclaw_gateway_password"
      display: "OPENCLAW_GATEWAY_PASSWORD"
      type: secret
      required: true
      description: "Environment variable: OPENCLAW_GATEWAY_PASSWORD"
      group: advanced
    - name: "openclaw_gateway_port"
      display: "OPENCLAW_GATEWAY_PORT"
      type: number
      required: false
      description: "Environment variable: OPENCLAW_GATEWAY_PORT"
      group: connection
    - name: "openclaw_gateway_token"
      display: "OPENCLAW_GATEWAY_TOKEN"
      type: secret
      required: true
      description: "Environment variable: OPENCLAW_GATEWAY_TOKEN"
      group: connection
    - name: "openclaw_live_browser_cdp_url"
      display: "OPENCLAW_LIVE_BROWSER_CDP_URL"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_LIVE_BROWSER_CDP_URL"
      group: connection

  tools:
    []

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Browser"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw browser extension"

  setup: |
    ## Browser Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  code:
    entrypoint: "browser-bridge.ts"
    files:
