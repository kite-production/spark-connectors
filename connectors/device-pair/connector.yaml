# Spark Connector Spec — Device Pair
# Generated from OpenClaw extension: device-pair
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: device-pair
  name: "Device Pair"
  type: device
  version: "1.0.0"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Devices"
  tags: ["Device"]
  icon: bluetooth
  iconColor: "#0082FC"
  description: >
    Spark Device Pair connector
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "mDNS / Bluetooth"
    docker:
      image: ghcr.io/kite-production/connector-device-pair
      tag: "1.0.0"
      ports:
        grpc: 50071

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Device connector — executes commands on paired devices"

  config:
    - name: "publicUrl"
      display: "publicUrl"
      type: text
      required: false
      description: "publicUrl"
      group: connection

  tools:
    []

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Device Pair"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
    - version: "1.0.0"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw device-pair extension"

  setup: |
    ## Device Pair Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/device-pair/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
