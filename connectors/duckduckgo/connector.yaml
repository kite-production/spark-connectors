# Spark Connector Spec — DuckDuckGo
# Generated from OpenClaw extension: duckduckgo
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: duckduckgo
  name: "DuckDuckGo"
  type: search
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Search"
  tags: ["Search"]
  icon: search
  iconColor: "#DE5833"
  description: >
    OpenClaw DuckDuckGo plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "REST API (net/http)"
    docker:
      image: spark/connector-duckduckgo
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50162

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Search provider — returns results on query"

  config:
    - name: "webSearch"
      display: "webSearch"
      type: text
      required: false
      description: "webSearch"
      group: connection

  tools:
    - name: "duckduckgo-search"
      method: POST
      description: "Search via DuckDuckGo"
      category: query
      args:
        - name: query
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "10"
      returns:
        type: array
        description: "Search results"

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to DuckDuckGo"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw duckduckgo extension"

  setup: |
    ## DuckDuckGo Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/duckduckgo/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
