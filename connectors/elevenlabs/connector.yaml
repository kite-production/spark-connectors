# Spark Connector Spec — ElevenLabs
# Generated from OpenClaw extension: elevenlabs
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: elevenlabs
  name: "ElevenLabs"
  type: service
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Services"
  tags: ["Service"]
  icon: record_voice_over
  iconColor: "#000000"
  description: >
    OpenClaw ElevenLabs speech plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: python
    sdk_package: "elevenlabs"
    execution_mode: on_demand
    # persistent = long-running container (monitors events)
    # on_demand  = container started per tool/action call, stopped after
    docker:
      image: ghcr.io/kite-production/connector-elevenlabs
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50161

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Service connector — provides capabilities to agents"

  config:
    - name: "elevenlabs_api_key"
      display: "ELEVENLABS_API_KEY"
      type: secret
      required: true
      description: "Environment variable: ELEVENLABS_API_KEY"
      group: connection
    - name: "xi_api_key"
      display: "XI_API_KEY"
      type: secret
      required: true
      description: "Environment variable: XI_API_KEY"
      group: connection

  tools:
    []

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to ElevenLabs"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw elevenlabs extension"

  setup: |
    ## ElevenLabs Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/elevenlabs/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
