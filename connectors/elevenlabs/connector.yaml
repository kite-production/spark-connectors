# ── SPEC
spec:
  runtime:
    type: docker
    language: typescript
    docker:
      image: spark/connector-elevenlabs
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50131

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Service connector — provides capabilities to agents"

  config:
    - name: "elevenlabs_api_key"
      display: "ELEVENLABS_API_KEY"
      type: secret
      required: true
      description: "Environment variable: ELEVENLABS_API_KEY"
      group: connection
    - name: "xi_api_key"
      display: "XI_API_KEY"
      type: secret
      required: true
      description: "Environment variable: XI_API_KEY"
      group: connection

  tools:
    []

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to ElevenLabs"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
