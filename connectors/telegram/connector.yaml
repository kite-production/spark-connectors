# Spark Connector Spec — Telegram
# Generated from OpenClaw extension: telegram
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: telegram
  name: "Telegram"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: send
  iconColor: "#0088CC"
  description: >
    OpenClaw Telegram channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    sdk_language: go
    sdk_package: "go-telegram-bot-api/telegram-bot-api"
    execution_mode: persistent
    # persistent = long-running container (monitors events)
    # on_demand  = container started per tool/action call, stopped after
    docker:
      image: ghcr.io/kite-production/connector-telegram
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50090

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Telegram"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: true
    supports_documents: true
    supports_threads: false
    supports_reactions: true
    supports_reply: true
    supports_edit: true
    supports_typing_indicator: true
    supports_groups: true
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "openclaw_debug_telegram_accounts"
      display: "OPENCLAW_DEBUG_TELEGRAM_ACCOUNTS"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_DEBUG_TELEGRAM_ACCOUNTS"
      group: advanced
    - name: "openclaw_debug_telegram_ingress"
      display: "OPENCLAW_DEBUG_TELEGRAM_INGRESS"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_DEBUG_TELEGRAM_INGRESS"
      group: advanced
    - name: "openclaw_state_dir"
      display: "OPENCLAW_STATE_DIR"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_STATE_DIR"
      group: advanced
    - name: "telegram_bot_token"
      display: "TELEGRAM_BOT_TOKEN"
      type: secret
      required: true
      description: "Environment variable: TELEGRAM_BOT_TOKEN"
      group: connection
    - name: "vitest"
      display: "VITEST"
      type: text
      required: false
      description: "Environment variable: VITEST"
      group: advanced
    - name: "vitest_pool_id"
      display: "VITEST_POOL_ID"
      type: text
      required: false
      description: "Environment variable: VITEST_POOL_ID"
      group: advanced
    - name: "your_user_id"
      display: "YOUR_USER_ID"
      type: text
      required: false
      description: "Environment variable: YOUR_USER_ID"
      group: advanced

  tools:
    - name: "telegram-send-message"
      method: POST
      description: "Send a message via Telegram"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "telegram-list-messages"
      method: GET
      description: "List recent messages from Telegram"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Telegram"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw telegram extension"

  setup: |
    ## Telegram Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/telegram/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
