# Spark Connector Spec — Feishu
# Generated from OpenClaw extension: feishu
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: feishu
  name: "Feishu"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: translate
  iconColor: "#3370FF"
  description: >
    OpenClaw Feishu/Lark channel plugin (community maintained by @m1heng)
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: typescript
    framework: "node-sdk"
    docker:
      image: spark/connector-feishu
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50131

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Feishu"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: false
    supports_reactions: false
    supports_reply: true
    supports_edit: false
    supports_typing_indicator: false
    supports_groups: false
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "feishu_app_id"
      display: "FEISHU_APP_ID"
      type: text
      required: false
      description: "Environment variable: FEISHU_APP_ID"
      group: advanced
    - name: "feishu_app_secret"
      display: "FEISHU_APP_SECRET"
      type: secret
      required: true
      description: "Environment variable: FEISHU_APP_SECRET"
      group: advanced
    - name: "feishu_encrypt_key"
      display: "FEISHU_ENCRYPT_KEY"
      type: secret
      required: true
      description: "Environment variable: FEISHU_ENCRYPT_KEY"
      group: connection
    - name: "feishu_verification_token"
      display: "FEISHU_VERIFICATION_TOKEN"
      type: secret
      required: true
      description: "Environment variable: FEISHU_VERIFICATION_TOKEN"
      group: connection
    - name: "https_proxy"
      display: "HTTPS_PROXY"
      type: text
      required: false
      description: "Environment variable: HTTPS_PROXY"
      group: advanced
    - name: "http_proxy"
      display: "HTTP_PROXY"
      type: text
      required: false
      description: "Environment variable: HTTP_PROXY"
      group: advanced
    - name: "openclaw_state_dir"
      display: "OPENCLAW_STATE_DIR"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_STATE_DIR"
      group: advanced

  tools:
    - name: "feishu-send-message"
      method: POST
      description: "Send a message via Feishu"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "feishu-list-messages"
      method: GET
      description: "List recent messages from Feishu"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Feishu"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw feishu extension"

  setup: |
    ## Feishu Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  code:
    entrypoint: "api.ts"
    files:
      - path: "api.ts"
        language: typescript
        size: 367
      - path: "channel-entry.ts"
        language: typescript
        size: 464
      - path: "contract-api.ts"
        language: typescript
        size: 266
      - path: "contract-surfaces.ts"
        language: typescript
        size: 189
      - path: "index.ts"
        language: typescript
        size: 3228
      - path: "openclaw.plugin.json"
        language: json
        size: 176
      - path: "runtime-api.ts"
        language: typescript
        size: 1788
      - path: "session-key-api.ts"
        language: typescript
        size: 112
      - path: "setup-api.ts"
        language: typescript
        size: 118
      - path: "setup-entry.ts"
        language: typescript
        size: 170
