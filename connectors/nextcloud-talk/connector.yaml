# Spark Connector Spec — Nextcloud Talk
# Generated from OpenClaw extension: nextcloud-talk
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: nextcloud-talk
  name: "Nextcloud Talk"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: cloud
  iconColor: "#0082C9"
  description: >
    OpenClaw Nextcloud Talk channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: typescript
    docker:
      image: spark/connector-nextcloud-talk
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50131

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Nextcloud Talk"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: false
    supports_reactions: false
    supports_reply: true
    supports_edit: false
    supports_typing_indicator: false
    supports_groups: false
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "nextcloud_talk_bot_secret"
      display: "NEXTCLOUD_TALK_BOT_SECRET"
      type: secret
      required: true
      description: "Environment variable: NEXTCLOUD_TALK_BOT_SECRET"
      group: advanced
    - name: "nextcloud_talk_main_bot_secret"
      display: "NEXTCLOUD_TALK_MAIN_BOT_SECRET"
      type: secret
      required: true
      description: "Environment variable: NEXTCLOUD_TALK_MAIN_BOT_SECRET"
      group: advanced
    - name: "openclaw_debug_nextcloud_talk_accounts"
      display: "OPENCLAW_DEBUG_NEXTCLOUD_TALK_ACCOUNTS"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_DEBUG_NEXTCLOUD_TALK_ACCOUNTS"
      group: advanced

  tools:
    - name: "nextcloud-talk-send-message"
      method: POST
      description: "Send a message via Nextcloud Talk"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "nextcloud-talk-list-messages"
      method: GET
      description: "List recent messages from Nextcloud Talk"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Nextcloud Talk"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw nextcloud-talk extension"

  setup: |
    ## Nextcloud Talk Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  code:
    entrypoint: "api.ts"
    files:
      - path: "api.ts"
        language: typescript
        size: 56
      - path: "contract-surfaces.ts"
        language: typescript
        size: 110
      - path: "index.ts"
        language: typescript
        size: 517
      - path: "openclaw.plugin.json"
        language: json
        size: 166
      - path: "runtime-api.ts"
        language: typescript
        size: 192
      - path: "setup-entry.ts"
        language: typescript
        size: 184
