# Spark Connector Spec — Discord
# Generated from OpenClaw extension: discord
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: discord
  name: "Discord"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: headset_mic
  iconColor: "#5865F2"
  description: >
    OpenClaw Discord channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: go
    docker:
      image: spark/connector-discord
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50169

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from Discord"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: true
    supports_documents: true
    supports_threads: true
    supports_reactions: true
    supports_reply: true
    supports_edit: true
    supports_typing_indicator: true
    supports_groups: true
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "discord_bot_token"
      display: "DISCORD_BOT_TOKEN"
      type: secret
      required: true
      description: "Environment variable: DISCORD_BOT_TOKEN"
      group: connection
    - name: "discord_token"
      display: "DISCORD_TOKEN"
      type: secret
      required: true
      description: "Environment variable: DISCORD_TOKEN"
      group: connection
    - name: "openclaw_gateway_token"
      display: "OPENCLAW_GATEWAY_TOKEN"
      type: secret
      required: true
      description: "Environment variable: OPENCLAW_GATEWAY_TOKEN"
      group: connection
    - name: "openclaw_gateway_url"
      display: "OPENCLAW_GATEWAY_URL"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_GATEWAY_URL"
      group: connection
    - name: "openclaw_state_dir"
      display: "OPENCLAW_STATE_DIR"
      type: text
      required: false
      description: "Environment variable: OPENCLAW_STATE_DIR"
      group: advanced
    - name: "vitest"
      display: "VITEST"
      type: text
      required: false
      description: "Environment variable: VITEST"
      group: advanced

  tools:
    - name: "discord-send-message"
      method: POST
      description: "Send a message via Discord"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "discord-list-messages"
      method: GET
      description: "List recent messages from Discord"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Discord"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw discord extension"

  setup: |
    ## Discord Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  # Go implementation: connectors/discord/src/
  # Each connector has a separate Go module with:
  #   cmd/server/main.go        — entry point
  #   internal/service/service.go — ConnectorService gRPC impl
  #   internal/normalizer/       — message normalization
  #   Dockerfile                 — container build
  #   go.mod                     — dependencies
  # Status: pending Go conversion
