  name: "Memory LanceDB"
  type: service
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Services"
  tags: ["Service"]
  icon: database
  iconColor: "#7bdc7b"
  description: >
    OpenClaw LanceDB-backed long-term memory plugin with auto-recall/capture
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: typescript
    framework: "lancedb"
    docker:
      image: spark/connector-memory-lancedb
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50153

  auth:
    type: api_key
    flow: automatic

  ingestion:
    enabled: false
    mode: none
    description: "Service connector — provides capabilities to agents"

  config:
    - name: "embedding"
      display: "embedding"
      type: text
      required: false
      description: "embedding"
      group: connection
    - name: "dbPath"
      display: "dbPath"
      type: text
      required: false
      description: "dbPath"
      group: connection
    - name: "autoCapture"
      display: "autoCapture"
      type: boolean
      required: false
      description: "autoCapture"
      group: connection
    - name: "autoRecall"
      display: "autoRecall"
      type: boolean
      required: false
      description: "autoRecall"
      group: connection
    - name: "captureMaxChars"
      display: "captureMaxChars"
      type: number
      required: false
      description: "captureMaxChars"
      group: advanced

  tools:
    []

  events:
    []

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to Memory LanceDB"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw memory-lancedb extension"

  setup: |
    ## Memory LanceDB Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

