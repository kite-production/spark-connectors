# Spark Connector Spec — iMessage
# Generated from OpenClaw extension: imessage
apiVersion: spark.dev/v1
kind: Connector

# ── METADATA
metadata:
  id: imessage
  name: "iMessage"
  type: channel
  version: "2026.4.1-beta.1"
  source: spark
  publisher: "Spark"
  maintainers:
    - name: "Spark Team"
      email: "spark@kite.ai"
  category: "Communication"
  tags: ["Channel"]
  icon: message
  iconColor: "#34C759"
  description: >
    OpenClaw iMessage channel plugin
  license: MIT
  homepage: https://github.com/kite-production/spark
  repository: https://github.com/kite-production/spark-connectors

# ── SPEC
spec:
  runtime:
    type: docker
    language: typescript
    docker:
      image: spark/connector-imessage
      tag: "2026.4.1-beta.1"
      ports:
        grpc: 50080

  auth:
    type: none
    flow: automatic

  ingestion:
    enabled: true
    mode: push
    description: "Receives messages from iMessage"

  capabilities:
    supports_text: true
    supports_images: true
    supports_audio: false
    supports_documents: false
    supports_threads: false
    supports_reactions: false
    supports_reply: true
    supports_edit: false
    supports_typing_indicator: false
    supports_groups: false
    max_message_length: 4096
    supported_media_types:
      - "image/jpeg"
      - "image/png"

  config:
    - name: "vitest"
      display: "VITEST"
      type: text
      required: false
      description: "Environment variable: VITEST"
      group: advanced

  tools:
    - name: "imessage-send-message"
      method: POST
      description: "Send a message via iMessage"
      category: messaging
      args:
        - name: to
          type: string
          description: "Recipient ID or channel"
          required: true
        - name: text
          type: string
          description: "Message content"
          required: true
      returns:
        type: object
        properties:
          message_id: { type: string }
    - name: "imessage-list-messages"
      method: GET
      description: "List recent messages from iMessage"
      category: query
      args:
        - name: chat_id
          type: string
          required: true
        - name: limit
          type: number
          required: false
          default: "50"
      returns:
        type: array
        description: "List of messages"

  events:
    - name: message.received
      description: "New message received"
      payload:
        message_id: string
        chat_id: string
        sender: string
        text: string
        timestamp: string
    - name: connection.status
      description: "Connection state changed"
      payload:
        status: string
        reason: string

  health:
    endpoint: "/health"
    interval: 15s
    timeout: 5s
    unhealthy_threshold: 3
    test:
      endpoint: "/test"
      description: "Verify connectivity to iMessage"
      timeout: 10s
      expected_status: 200

  dependencies:
    services: ["nats", "control-plane"]
    optional: ["minio"]

  versions:
    - version: "2026.4.1-beta.1"
      date: "2026-04-05"
      breaking: false
      changes:
        - "Initial Spark marketplace release"
        - "Adapted from OpenClaw imessage extension"

  setup: |
    ## iMessage Connector Setup
    1. Install the connector from the Spark Marketplace
    2. Create an instance in your workspace
    3. Configure the required parameters
    4. Click 'Test Connection' to verify
    5. Enable the connector for your agents

  code:
    entrypoint: "api.ts"
    files:
      - path: "api.ts"
        language: typescript
        size: 601
      - path: "channel-config-api.ts"
        language: typescript
        size: 70
      - path: "config-api.ts"
        language: typescript
        size: 113
      - path: "contract-api.ts"
        language: typescript
        size: 408
      - path: "contract-surfaces.ts"
        language: typescript
        size: 3170
      - path: "index.ts"
        language: typescript
        size: 469
      - path: "openclaw.plugin.json"
        language: json
        size: 154
      - path: "runtime-api.ts"
        language: typescript
        size: 1505
      - path: "setup-entry.ts"
        language: typescript
        size: 253
